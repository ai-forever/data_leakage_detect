site_name: FiMMIA Documentation
site_description: Framework for Multimodal Membership Inference Attacks
site_url: https://fimmia.readthedocs.io/
repo_name: ai-forever/data_leakage_detect
repo_url: https://github.com/ai-forever/data_leakage_detect
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            merge_init_into_class: true
            separate_signature: true
            heading_level: 3

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Usage:
    - CLI Reference: usage/cli-reference.md
    - Python API: usage/python-api.md
    - Pipeline Guide: usage/pipeline.md
  - API Reference:
    - FiMMIA: api/fimmia.md
    - Shift Detection: api/shift_detection.md
  - Tutorials:
    - Training: tutorials/training.md
    - Inference: tutorials/inference.md
    - Examples: tutorials/examples.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ai-forever/data_leakage_detect
  version:
    provider: mike
