version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  commands:
    - pip install uv
    - uv pip install -r docs/requirements.txt
    - uv pip install -e .
    - zensical build

# Dependencies installed in build.commands above (uv); no separate python.install needed.

formats:
  - htmlzip
  - pdf
